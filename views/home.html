<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Article</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --border: #d6d2c8;
      --text: #1a1814;
      --muted: #8c887e;
      --accent: #c4382a;
      --focus: #1a1814;
      --mono: 'DM Mono', monospace;
      --serif: 'Playfair Display', Georgia, serif;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      padding: 2rem;
    }

    .wrapper {
      width: 100%;
      max-width: 640px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2.5rem;
      border-bottom: 1.5px solid var(--text);
      padding-bottom: 1rem;
    }

    .header-tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      background: #f5e9e8;
      border: 1px solid #e8c5c2;
      padding: 0.2rem 0.55rem;
      border-radius: 2px;
    }

    .header h1 {
      font-family: var(--serif);
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    /* Form card */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 2rem 2.2rem;
      box-shadow: 4px 4px 0px #d6d2c8;
    }

    .field {
      margin-bottom: 1.6rem;
      animation: fadeUp 0.5s ease both;
    }
    .field:nth-child(1) { animation-delay: 0.05s; }
    .field:nth-child(2) { animation-delay: 0.1s; }
    .field:nth-child(3) { animation-delay: 0.15s; }

    label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    label .req {
      color: var(--accent);
      font-size: 0.75rem;
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 3px;
      padding: 0.65rem 0.85rem;
      font-family: var(--mono);
      font-size: 0.875rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: #b8b4aa;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--focus);
      background: #ffffff;
      box-shadow: 3px 3px 0px #d6d2c8;
    }

    textarea {
      height: 140px;
      resize: vertical;
      line-height: 1.6;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 1.8rem 0 1.6rem;
    }

    /* Footer row */
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-note {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    button.create {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ffffff;
      background: var(--text);
      border: 1.5px solid var(--text);
      border-radius: 3px;
      padding: 0.65rem 1.6rem;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s, transform 0.1s;
      box-shadow: 3px 3px 0px #8c887e;
    }

    button.create:hover {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 3px 3px 0px #9a2a20;
    }

    button.create:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px #9a2a20;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <span class="header-tag">New</span>
      <h1>Create Article</h1>
    </div>

    <div class="card">
      <form action="/" method="post">
        <div class="field">
          <label for="title">Title <span class="req">*</span></label>
          <input type="text" id="title" name="title" placeholder="Enter article title…" required>
        </div>

        <div class="field">
          <label for="summary">Summary <span class="req">*</span></label>
          <input type="text" id="summary" name="summary" placeholder="One-line description…" required>
        </div>

        <div class="field">
          <label for="body">Body <span class="req">*</span></label>
          <textarea id="body" name="body" placeholder="Write your article content here…" required></textarea>
        </div>

        <hr class="divider">

        <div class="footer-row">
          <span class="footer-note">All fields required</span>
          <button type="submit" class="create">Publish →</button>
        </div>

      </form>
    </div>
  </div>
</body>
</html>
